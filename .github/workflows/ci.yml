name: CI Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-x86_64:
    name: Build x86_64 Core
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang lld xorriso qemu-system-x86 make curl

      - name: Build Orizon OS x86_64
        run: |
          make clean
          make

      - name: Check artifacts
        run: |
          ls -lh orizon-os-x86_64/build/kernel.elf
          ls -lh orizon-os-x86_64/orizonos-x86_64.iso
          file orizon-os-x86_64/build/kernel.elf

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: orizon-os-x86_64-ci
          path: |
            orizon-os-x86_64/build/kernel.elf
            orizon-os-x86_64/orizonos-x86_64.iso
          retention-days: 7
