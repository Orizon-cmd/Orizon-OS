name: Build and Release Orizon OS

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (for example v0.1.0)"
        required: true
        default: "v0.1.0"

jobs:
  build-x86_64:
    name: Build x86_64 Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang lld xorriso qemu-system-x86 make curl

      - name: Build release artifacts
        run: |
          make clean
          make
          mkdir -p release/x86_64
          cp orizon-os-x86_64/build/kernel.elf release/x86_64/orizon-os-core-x86_64.elf
          cp orizon-os-x86_64/orizonos-x86_64.iso release/x86_64/orizon-os-core-x86_64.iso
          cd release/x86_64
          sha256sum * > SHA256SUMS
          cd ../..
          tar -czf orizon-os-core-x86_64.tar.gz -C release/x86_64 .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: orizon-os-core-x86_64
          path: orizon-os-core-x86_64.tar.gz
          retention-days: 90

  create-release:
    name: Create GitHub Release
    needs: [build-x86_64]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: orizon-os-core-x86_64
          path: artifacts

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Write release notes
        run: |
          cat > release_notes.md << 'EOF'
          # Orizon OS

          Minimal x86_64 development release.

          Included artifacts:
          - `orizon-os-core-x86_64.elf`
          - `orizon-os-core-x86_64.iso`
          - `SHA256SUMS`
          EOF

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.value }}
          name: Orizon OS ${{ steps.version.outputs.value }}
          body_path: release_notes.md
          files: artifacts/orizon-os-core-x86_64.tar.gz
